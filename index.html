<body>

<div class="container">

<h1>Counting down to your day Jai 💖🎂</h1>

<div id="countdown"></div>

<div class="quote">
"I don’t say this often, but you really mean a lot to me. No matter what happens, I’ll always be here for you.💖”
</div>

<div class="quote">
“You are my favorite memory and my forever person 🫶”

<div class="quote">
“No matter what happens, I’ll always be here for you. 💫”
</div>

<div class="gallery">
    <img src="j2.jpeg">
    <img src="j5.jpeg">
    <img src="j6.jpeg">
    <img src="j424.jpeg">
</div>

<br>

<button onclick="toggleMusic()">🎵 Play / Pause Music</button>

<!-- AUTOPLAY (Muted First) -->
<audio id="music" autoplay loop muted>
    <source src="ja.mp3" type="audio/mpeg">
</audio>

</div>

<script>

/* COUNTDOWN */
let target = new Date("April 20, 2026 00:00:00").getTime();

setInterval(() => {
    let now = new Date().getTime();
    let diff = target - now;

    let days = Math.floor(diff / (1000 * 60 * 60 * 24));
    let hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
    let mins = Math.floor((diff / (1000 * 60)) % 60);
    let secs = Math.floor((diff / 1000) % 60);

    document.getElementById("countdown").innerHTML =
        days + "d " + hours + "h " + mins + "m " + secs + "s ";

}, 1000);

/* TRY TO UNMUTE AUTOMATICALLY */
let m = document.getElementById("music");

setTimeout(() => {
    m.muted = false;
    m.volume = 1;

    let playPromise = m.play();

    if (playPromise !== undefined) {
        playPromise.catch(() => {
            console.log("Autoplay with sound blocked by browser");
        });
    }
}, 2000);

/* BUTTON CONTROL */
function toggleMusic() {
    if (m.paused) m.play();
    else m.pause();
}

/* FLOATING HEARTS */
setInterval(() => {
    let heart = document.createElement("div");
    heart.className = "heart";
    heart.innerHTML = "💖";
    heart.style.left = Math.random() * 100 + "vw";
    document.body.appendChild(heart);

    setTimeout(() => heart.remove(), 6000);
}, 300);

</script>

</body>
